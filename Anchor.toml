[toolchain]
anchor_version = "0.32.1"
solana_version = "2.3.0"

[features]
resolution = true
skip-lint   = false

[programs.localnet]
sss_core = ""
sss_hook = ""

[programs.devnet]
sss_core = ""
sss_hook = ""

[programs.mainnet]
sss_core = ""
sss_hook = ""

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test     = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.ts'"
test-t1  = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/tier1.ts"
test-t2  = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/tier2.ts"
test-t3  = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/tier3.ts"
test-acl = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/access_control.ts"
